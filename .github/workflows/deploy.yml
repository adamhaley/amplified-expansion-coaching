name: Deploy

on:
  push:
    branches:
      - master
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set target directory
        id: set-dir
        run: |
          case "${{ github.ref_name }}" in
            master)
              echo "target_dir=/home/jena/public_html" >> $GITHUB_OUTPUT
              ;;
            staging)
              echo "target_dir=/home/jena/domains/staging.amplifiedexpansion.com/public_html" >> $GITHUB_OUTPUT
              ;;
          esac
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSHKEY }}
          script: |
            set -euo pipefail
            cd ${{ steps.set-dir.outputs.target_dir }}
            echo "Host: $(hostname)"
            echo "Deploy dir: $(pwd)"
            echo "Branch: ${{ github.ref_name }}"
            echo "Target SHA: ${{ github.sha }}"
            git remote -v
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            current_sha="$(git rev-parse HEAD)"
            echo "Current SHA: ${current_sha}"
            if [ "${current_sha}" != "${{ github.sha }}" ]; then
              echo "Deploy verification failed: expected ${{ github.sha }} but found ${current_sha}" >&2
              exit 1
            fi
